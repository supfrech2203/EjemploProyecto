<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de Publicaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    

    <div class="container py-5 ">
        
        <h1 class="text-center mb-4">Muro Comunitario</h1>
       
        <!-- Formulario para publicar -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Nueva Publicación</h5>
                <form id="form-publicacion">
                    <div class="mb-3">
                        <input type="text" id="titulo" class="form-control" placeholder="Título de la publicación" required>
                    </div>
                    <div class="mb-3">
                        <textarea id="comentario" class="form-control" rows="3" placeholder="¿Qué estás pensando?" required></textarea>
                    </div>
                    <div class="mb-3">
                        <input type="url" id="imagen_url" class="form-control" placeholder="URL de la imagen (opcional)">
                    </div>
                    <button type="submit" class="btn btn-primary">Publicar</button>
                </form>
            </div>
        </div>

         <!-- Contenedor donde JS inyectará las publicaciones -->
        <div id="contenedor-posts" class="row g-4">
            <!-- Las publicaciones cargarán aquí dinámicamente -->
        </div>
        
    </div>

    <script src="js/publicaciones.js"></script>
</body>
</html>
